name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install black flake8 pytest

      - name: Lint
        run: flake8 .

      - name: Format Check
        run: black --check .

      - name: Run tests
       run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest
